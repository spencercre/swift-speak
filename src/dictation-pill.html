<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data:" />
  <title>Swift Speak — Pill</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 280px;
      height: 56px;
      background: transparent;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      user-select: none;
      -webkit-user-drag: none;
    }

    .pill {
      width: 280px;
      height: 56px;
      background: rgba(253, 246, 233, 0.92);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 12px;
      color: #3A3A3A;
      font-size: 14px;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 200ms ease-out, transform 200ms ease-out;
      will-change: opacity, transform;
    }
    .pill.show {
      opacity: 1;
      transform: translateY(0);
    }
    .pill.hide {
      opacity: 0;
      transform: translateY(0);
      transition: opacity 250ms ease-in;
    }

    .indicator {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .indicator.recording {
      background: #E8735A;
      animation: dot-pulse 1s ease-in-out infinite;
    }
    .indicator.transcribing { background: #5BA4A4; }
    .indicator.done { background: transparent; }
    .indicator.error { background: #F5A623; }

    @keyframes dot-pulse {
      0%, 100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }

    .text {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .aux {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      min-width: 36px;
      justify-content: flex-end;
    }

    /* TODO(audio-levels): swap this fallback for a reactive 5-bar visualizer
       driven by analyser-node levels once we wire the recorder to emit live
       data. The Python recorder doesn't currently expose audio levels. */
    .bars {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 28px;
    }
    .bars .bar {
      width: 3px;
      background: #5BA4A4;
      border-radius: 2px;
      transform-origin: center;
      animation: bar-pulse 1.1s ease-in-out infinite;
    }
    .bars .bar:nth-child(1) { height: 8px;  animation-delay: 0.00s; }
    .bars .bar:nth-child(2) { height: 18px; animation-delay: 0.10s; }
    .bars .bar:nth-child(3) { height: 28px; animation-delay: 0.20s; }
    .bars .bar:nth-child(4) { height: 18px; animation-delay: 0.10s; }
    .bars .bar:nth-child(5) { height: 8px;  animation-delay: 0.00s; }
    @keyframes bar-pulse {
      0%, 100% { transform: scaleY(0.4); opacity: 0.7; }
      50%      { transform: scaleY(1);   opacity: 1; }
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(91, 164, 164, 0.25);
      border-top-color: #5BA4A4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .check {
      width: 14px;
      height: 14px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="pill" id="pill">
    <span class="indicator" id="indicator"></span>
    <span class="text" id="text"></span>
    <div class="aux" id="aux"></div>
  </div>

  <script>
    const pill      = document.getElementById('pill');
    const indicator = document.getElementById('indicator');
    const textEl    = document.getElementById('text');
    const auxEl     = document.getElementById('aux');

    let hideTimer = null;
    function clearHideTimer() {
      if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
    }

    function reveal() {
      pill.classList.remove('hide');
      // Force a reflow so subsequent .show triggers the transition reliably
      // when arriving from a fading-out hide state.
      // eslint-disable-next-line no-unused-expressions
      pill.offsetHeight;
      pill.classList.add('show');
    }
    function fadeOut() {
      pill.classList.remove('show');
      pill.classList.add('hide');
    }

    function setRecording() {
      clearHideTimer();
      indicator.className = 'indicator recording';
      indicator.innerHTML = '';
      textEl.textContent = 'Listening...';
      auxEl.innerHTML =
        '<div class="bars">' +
        '<div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>' +
        '</div>';
      reveal();
    }

    function setTranscribing() {
      clearHideTimer();
      indicator.className = 'indicator transcribing';
      indicator.innerHTML = '';
      textEl.textContent = 'Transcribing...';
      auxEl.innerHTML = '<div class="spinner"></div>';
      reveal();
    }

    function setDone() {
      clearHideTimer();
      indicator.className = 'indicator done';
      indicator.innerHTML =
        '<svg class="check" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
        '<path d="M2 7.4 L5.6 11 L12 4" fill="none" stroke="#4CAF50" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>' +
        '</svg>';
      textEl.textContent = 'Done';
      auxEl.innerHTML = '';
      reveal();
      hideTimer = setTimeout(() => { fadeOut(); hideTimer = null; }, 600);
    }

    function setError(message) {
      clearHideTimer();
      indicator.className = 'indicator error';
      indicator.innerHTML = '';
      textEl.textContent = message || 'Error';
      auxEl.innerHTML = '';
      reveal();
      hideTimer = setTimeout(() => { fadeOut(); hideTimer = null; }, 2000);
    }

    function setHidden() {
      clearHideTimer();
      fadeOut();
    }

    if (window.swiftSpeak && typeof window.swiftSpeak.onPillState === 'function') {
      window.swiftSpeak.onPillState((s) => {
        if (!s || !s.kind) return;
        switch (s.kind) {
          case 'recording':    setRecording();         break;
          case 'transcribing': setTranscribing();      break;
          case 'done':         setDone();              break;
          case 'error':        setError(s.message);    break;
          case 'hide':         setHidden();            break;
        }
      });
    }
  </script>
</body>
</html>
