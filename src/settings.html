<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'unsafe-inline'" />
  <title>Swift Type — Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #1a1a1a;
      color: #e5e5e5;
      padding: 20px 24px;
      user-select: none;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #999;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    select {
      width: 100%;
      background: #262626;
      border: 1px solid #404040;
      border-radius: 5px;
      color: #e5e5e5;
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
      appearance: none;
    }

    select:focus { border-color: #555; }

    /* Hotkey capture button */
    .hotkey-btn {
      width: 100%;
      background: #262626;
      border: 1px solid #404040;
      border-radius: 5px;
      color: #e5e5e5;
      font-size: 13px;
      font-family: inherit;
      padding: 7px 10px;
      text-align: left;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }

    .hotkey-btn:hover { border-color: #555; }

    .hotkey-btn.listening {
      border-color: #666;
      color: #888;
      background: #1e1e1e;
    }

    .hint {
      font-size: 11px;
      color: #666;
      margin-top: 5px;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 28px;
      padding-top: 16px;
      border-top: 1px solid #333;
    }

    button.btn-cancel, button.btn-save {
      padding: 7px 18px;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .btn-cancel {
      background: transparent;
      border-color: #404040;
      color: #999;
    }

    .btn-cancel:hover { border-color: #555; color: #ccc; }

    .btn-save {
      background: #fff;
      color: #000;
    }

    .btn-save:hover { background: #e5e5e5; }

    .status {
      font-size: 11px;
      color: #22c55e;
      margin-top: 8px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h1>Swift Type Settings</h1>

  <div class="field">
    <label>Microphone</label>
    <select id="mic">
      <option value="default">System Default</option>
    </select>
  </div>

  <div class="field">
    <label>Record Hotkey</label>
    <button class="hotkey-btn" id="hotkeyBtn" type="button">Ctrl+Win</button>
    <p class="hint">Click to capture a new hotkey combination.</p>
  </div>

  <div class="field">
    <label>Transcription Model</label>
    <select id="model">
      <option value="tiny">Tiny — fastest, least accurate</option>
      <option value="base">Base — recommended</option>
      <option value="small">Small — slower, most accurate</option>
    </select>
  </div>

  <p class="status" id="status"></p>

  <div class="actions">
    <button class="btn-cancel" onclick="window.close()">Cancel</button>
    <button class="btn-save" id="saveBtn">Save</button>
  </div>

  <script>
    const api = window.swiftType;
    const micEl      = document.getElementById("mic");
    const hotkeyBtn  = document.getElementById("hotkeyBtn");
    const modelEl    = document.getElementById("model");
    const statusEl   = document.getElementById("status");
    const saveBtn    = document.getElementById("saveBtn");

    // ── Key name mappings ──────────────────────────────────────────────────────

    // event.key → Electron accelerator name
    const KEY_TO_ELECTRON = {
      " ": "Space", "ArrowUp": "Up", "ArrowDown": "Down",
      "ArrowLeft": "Left", "ArrowRight": "Right",
      "Enter": "Return", "Escape": "Escape", "Tab": "Tab",
      "Backspace": "Backspace", "Delete": "Delete",
      "Home": "Home", "End": "End", "PageUp": "PageUp", "PageDown": "PageDown",
    };

    // Electron accelerator token → Windows display name
    const ELECTRON_TO_WIN = {
      "Control": "Ctrl", "CommandOrControl": "Ctrl",
      "Super": "Win", "Meta": "Win",
      "Return": "Enter", "Escape": "Esc",
    };

    const MODIFIERS = new Set(["Control", "Shift", "Alt", "Meta", "Super"]);

    function electronToDisplay(accelerator) {
      return accelerator
        .split("+")
        .map(tok => ELECTRON_TO_WIN[tok] ?? tok)
        .join("+");
    }

    function eventToElectron(e) {
      const mods = [];
      if (e.ctrlKey)  mods.push("Control");
      if (e.shiftKey) mods.push("Shift");
      if (e.altKey)   mods.push("Alt");
      if (e.metaKey)  mods.push("Super");   // Win key on Windows

      const raw = e.key;
      if (MODIFIERS.has(raw) || raw === "Meta") return null; // modifier-only, ignore

      let key = KEY_TO_ELECTRON[raw];
      if (!key) {
        // Single printable char → uppercase
        key = raw.length === 1 ? raw.toUpperCase() : raw;
      }

      // Need at least one modifier for a valid global shortcut
      if (mods.length === 0) return null;

      return [...mods, key].join("+");
    }

    // ── Hotkey capture ─────────────────────────────────────────────────────────

    let capturedAccelerator = "CommandOrControl+Shift+Space";

    function updateHotkeyBtn() {
      hotkeyBtn.textContent = electronToDisplay(capturedAccelerator);
    }

    let captureListener = null;

    hotkeyBtn.addEventListener("click", () => {
      if (captureListener) return; // already listening

      hotkeyBtn.classList.add("listening");
      hotkeyBtn.textContent = "Press your hotkey…";

      captureListener = (e) => {
        e.preventDefault();
        e.stopPropagation();

        const accelerator = eventToElectron(e);
        if (!accelerator) return; // ignore modifier-only press

        capturedAccelerator = accelerator;
        hotkeyBtn.classList.remove("listening");
        updateHotkeyBtn();

        window.removeEventListener("keydown", captureListener, true);
        captureListener = null;
      };

      window.addEventListener("keydown", captureListener, true);
    });

    // ── Init ───────────────────────────────────────────────────────────────────

    async function init() {
      const [settings, devices] = await Promise.all([
        api.getSettings(),
        api.getAudioDevices(),
      ]);

      // Mic dropdown — "System Default" is always first
      if (Array.isArray(devices) && devices.length > 0) {
        devices.forEach(d => {
          const opt = document.createElement("option");
          const name = d.name ?? d;
          opt.value = name;
          opt.textContent = d.label ?? name;
          if (settings.microphone === name) opt.selected = true;
          micEl.appendChild(opt);
        });
      }
      // If saved mic is "default" or unmatched, "System Default" option stays selected

      capturedAccelerator = settings.hotkey ?? "Control+Super";
      updateHotkeyBtn();
      modelEl.value = settings.model ?? "base";
    }

    // ── Save ───────────────────────────────────────────────────────────────────

    saveBtn.addEventListener("click", async () => {
      saveBtn.disabled = true;
      await api.saveSettings({
        hotkey:     capturedAccelerator,
        microphone: micEl.value,
        model:      modelEl.value,
      });
      statusEl.textContent = "Saved.";
      setTimeout(() => { statusEl.textContent = ""; }, 2000);
      saveBtn.disabled = false;
    });

    init();
  </script>
</body>
</html>
